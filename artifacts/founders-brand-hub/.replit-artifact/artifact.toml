kind = "web"
previewPath = "/founders-brand-hub/"
title = "Founders Brand Hub"
version = "1.0.0"
id = "artifacts/founders-brand-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19200
name = "web"
paths = ["/founders-brand-hub/"]

[services.development]
run = "pnpm --filter @workspace/founders-brand-hub run dev"

[services.env]
PORT = "19200"
BASE_PATH = "/founders-brand-hub/"

[services.production]
build = ["pnpm", "--filter", "@workspace/founders-brand-hub", "run", "build"]
publicDir = "artifacts/founders-brand-hub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
